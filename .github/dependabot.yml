version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Batch all security fixes into a single PR so they can be
      # reviewed and merged together (requires Dependabot security
      # updates to be enabled in repo Settings > Code security).
      security-fixes:
        applies-to: security-updates
        patterns:
          - "*"
      # Batch routine minor/patch production updates into one PR
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Batch routine minor/patch dev updates into one PR
      development-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major version bumps are not included in any group above, so they
    # arrive as individual PRs automatically for careful manual review.
